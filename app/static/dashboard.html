<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pipka.net — Job Dashboard</title>
<style>
  :root {
    --bg: #fff;
    --fg: #111;
    --muted: #666;
    --border: #ddd;
    --hover: #f5f5f5;
    --accent: #111;
    --green: #2d8a4e;
    --yellow: #b8860b;
    --red: #c0392b;
    --badge-bg: #f0f0f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
  }

  /* Header */
  header {
    border-bottom: 2px solid var(--fg);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  header h1 span { font-weight: 300; color: var(--muted); }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 32px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
  }
  .stats .num { font-weight: 700; color: var(--fg); font-size: 18px; display: block; }

  /* Filters */
  .filters {
    display: flex;
    gap: 12px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .filters input, .filters select {
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--fg);
    outline: none;
  }
  .filters input:focus, .filters select:focus {
    border-color: var(--fg);
  }
  .filters input[type="text"] { width: 220px; }
  .filters label { font-size: 12px; color: var(--muted); margin-right: -8px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 2px solid var(--fg);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th:hover { color: var(--fg); }
  th.sorted { color: var(--fg); }
  th .arrow { font-size: 10px; margin-left: 4px; }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:hover { background: var(--hover); }

  /* Score badge */
  .score {
    display: inline-block;
    font-weight: 700;
    font-size: 14px;
    width: 36px;
    text-align: center;
    border-radius: 4px;
    padding: 2px 0;
  }
  .score.high { color: var(--green); }
  .score.mid { color: var(--yellow); }
  .score.low { color: var(--red); }
  .score.none { color: var(--muted); }

  /* Status badge */
  .status-badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--badge-bg);
    color: var(--muted);
    white-space: nowrap;
  }
  .status-badge.applied { background: #e8f5e9; color: var(--green); }
  .status-badge.saved { background: #e3f2fd; color: #1565c0; }
  .status-badge.rejected { background: #fce4ec; color: var(--red); }

  /* Job title link */
  .job-title {
    font-weight: 600;
    color: var(--fg);
    text-decoration: none;
  }
  .job-title:hover { text-decoration: underline; }
  .job-company { color: var(--muted); font-size: 12px; }
  .job-loc { color: var(--muted); font-size: 12px; }

  /* Source tag */
  .source-tag {
    font-size: 10px;
    padding: 1px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
  }

  /* Salary */
  .salary { white-space: nowrap; font-variant-numeric: tabular-nums; }

  /* Actions */
  .actions { display: flex; gap: 4px; }
  .actions button {
    font-family: inherit;
    font-size: 12px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
    white-space: nowrap;
  }
  .actions button:hover { background: var(--fg); color: var(--bg); }
  .actions button.active { background: var(--fg); color: var(--bg); }
  .actions button:disabled { opacity: 0.4; cursor: default; }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
  }
  .pagination button {
    font-family: inherit;
    font-size: 13px;
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
  }
  .pagination button:hover { background: var(--fg); color: var(--bg); }
  .pagination button:disabled { opacity: 0.3; cursor: default; background: var(--bg); color: var(--fg); }

  /* Analysis modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg);
    border: 2px solid var(--fg);
    border-radius: 8px;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
  }
  .modal h2 { font-size: 16px; margin-bottom: 12px; }
  .modal pre {
    white-space: pre-wrap;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.6;
    color: var(--fg);
  }
  .modal .close {
    float: right;
    font-size: 20px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--fg);
    line-height: 1;
  }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--muted); }

  /* Responsive */
  @media (max-width: 768px) {
    .filters { padding: 8px 12px; }
    .stats { padding: 8px 12px; gap: 16px; }
    td, th { padding: 8px 6px; }
    header { padding: 12px; }
    .pagination { padding: 8px 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>pipka<span>.net</span></h1>
  <div style="font-size:12px;color:var(--muted)">Job Dashboard</div>
</header>

<div class="stats" id="stats">
  <div><span class="num" id="stat-total">—</span>Jobs in DB</div>
  <div><span class="num" id="stat-scored">—</span>Scored</div>
  <div><span class="num" id="stat-top">—</span>Top matches</div>
  <div><span class="num" id="stat-applied">—</span>Applied</div>
</div>

<div class="filters">
  <input type="text" id="f-search" placeholder="Search title or company...">
  <label>Min score</label>
  <select id="f-score">
    <option value="0">All</option>
    <option value="40">40+</option>
    <option value="60">60+</option>
    <option value="70" selected>70+</option>
    <option value="80">80+</option>
    <option value="90">90+</option>
  </select>
  <label>Source</label>
  <select id="f-source">
    <option value="">All</option>
    <option value="adzuna">Adzuna</option>
    <option value="indeed">Indeed</option>
    <option value="linkedin">LinkedIn</option>
    <option value="google">Google</option>
  </select>
  <label>Status</label>
  <select id="f-status">
    <option value="">All</option>
    <option value="new">New</option>
    <option value="saved">Saved</option>
    <option value="applied">Applied</option>
    <option value="rejected">Rejected</option>
  </select>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-sort="score" class="sorted">Score <span class="arrow">&#9660;</span></th>
        <th data-sort="title">Job</th>
        <th data-sort="company">Company</th>
        <th>Location</th>
        <th data-sort="salary">Salary</th>
        <th>Source</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="jobs-body">
      <tr><td colspan="8" class="loading">Loading...</td></tr>
    </tbody>
  </table>
</div>

<div class="pagination">
  <button id="prev-btn" disabled>&larr; Prev</button>
  <span id="page-info">—</span>
  <button id="next-btn" disabled>Next &rarr;</button>
</div>

<!-- Analysis modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close" onclick="closeModal()">&times;</button>
    <h2 id="modal-title">AI Analysis</h2>
    <pre id="modal-body">Loading...</pre>
  </div>
</div>

<script>
const state = {
  page: 1,
  perPage: 50,
  sort: 'score',
  order: 'desc',
  totalPages: 1,
};

// Elements
const tbody = document.getElementById('jobs-body');
const pageInfo = document.getElementById('page-info');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const searchInput = document.getElementById('f-search');
const scoreSelect = document.getElementById('f-score');
const sourceSelect = document.getElementById('f-source');
const statusSelect = document.getElementById('f-status');

// Debounce search
let searchTimeout;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { state.page = 1; loadJobs(); }, 400);
});
scoreSelect.addEventListener('change', () => { state.page = 1; loadJobs(); });
sourceSelect.addEventListener('change', () => { state.page = 1; loadJobs(); });
statusSelect.addEventListener('change', () => { state.page = 1; loadJobs(); });
prevBtn.addEventListener('click', () => { if (state.page > 1) { state.page--; loadJobs(); } });
nextBtn.addEventListener('click', () => { if (state.page < state.totalPages) { state.page++; loadJobs(); } });

// Sort headers
document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (state.sort === col) {
      state.order = state.order === 'desc' ? 'asc' : 'desc';
    } else {
      state.sort = col;
      state.order = 'desc';
    }
    state.page = 1;
    updateSortHeaders();
    loadJobs();
  });
});

function updateSortHeaders() {
  document.querySelectorAll('th[data-sort]').forEach(th => {
    const col = th.dataset.sort;
    const arrow = th.querySelector('.arrow');
    if (col === state.sort) {
      th.classList.add('sorted');
      if (arrow) arrow.innerHTML = state.order === 'desc' ? '&#9660;' : '&#9650;';
    } else {
      th.classList.remove('sorted');
      if (arrow) arrow.innerHTML = '';
    }
  });
}

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const d = await res.json();
    document.getElementById('stat-total').textContent = d.total_jobs || 0;
    document.getElementById('stat-scored').textContent = d.scored || 0;
    document.getElementById('stat-top').textContent = d.top_matches || 0;
    document.getElementById('stat-applied').textContent = d.applied || 0;
  } catch (e) { console.error('Stats error', e); }
}

async function loadJobs() {
  const params = new URLSearchParams({
    page: state.page,
    per_page: state.perPage,
    sort: state.sort,
    order: state.order,
    min_score: scoreSelect.value,
  });
  if (searchInput.value) params.set('search', searchInput.value);
  if (sourceSelect.value) params.set('source', sourceSelect.value);
  if (statusSelect.value) params.set('status', statusSelect.value);

  tbody.innerHTML = '<tr><td colspan="8" class="loading">Loading...</td></tr>';

  try {
    const res = await fetch('/api/jobs?' + params);
    const data = await res.json();
    state.totalPages = data.pages;

    pageInfo.textContent = `Page ${data.page} of ${data.pages} (${data.total} jobs)`;
    prevBtn.disabled = data.page <= 1;
    nextBtn.disabled = data.page >= data.pages;

    if (!data.jobs.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="loading">No jobs found</td></tr>';
      return;
    }

    tbody.innerHTML = data.jobs.map(j => renderRow(j)).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="8" class="loading">Error loading jobs</td></tr>';
    console.error(e);
  }
}

function renderRow(j) {
  const scoreClass = j.score >= 70 ? 'high' : j.score >= 40 ? 'mid' : j.score != null ? 'low' : 'none';
  const scoreText = j.score != null ? j.score : '—';
  const salary = formatSalary(j.salary_min, j.salary_max, j.salary_currency);
  const statusBadge = j.status
    ? `<span class="status-badge ${j.status}">${j.status}</span>`
    : '';
  const posted = j.posted_at ? new Date(j.posted_at).toLocaleDateString('de-DE') : '';

  return `<tr>
    <td><span class="score ${scoreClass}">${scoreText}</span></td>
    <td>
      <a class="job-title" href="${j.url || '#'}" target="_blank" rel="noopener">${esc(j.title)}</a>
      ${posted ? `<div class="job-loc">${posted}</div>` : ''}
    </td>
    <td><span class="job-company">${esc(j.company)}</span></td>
    <td><span class="job-loc">${esc(j.location)} (${j.country})</span></td>
    <td class="salary">${salary}</td>
    <td><span class="source-tag">${j.source}</span></td>
    <td>${statusBadge}</td>
    <td class="actions">
      <button onclick="doAction(${j.id},'save',this)" title="Save"${j.status === 'saved' ? ' class="active"' : ''}>&#128190;</button>
      <button onclick="doAction(${j.id},'applied',this)" title="Applied"${j.status === 'applied' ? ' class="active"' : ''}>&#10004;</button>
      <button onclick="doAction(${j.id},'reject',this)" title="Reject"${j.status === 'rejected' ? ' class="active"' : ''}>&#10006;</button>
      <button onclick="showAnalysis(${j.id},'${esc(j.title)}')" title="AI Analysis">&#129302;</button>
    </td>
  </tr>`;
}

function formatSalary(min, max, cur) {
  if (!min && !max) return '<span style="color:var(--muted)">—</span>';
  const c = cur || 'EUR';
  const fmt = n => Math.round(n).toLocaleString('de-DE');
  if (min && max) return `${fmt(min)}–${fmt(max)} ${c}`;
  if (min) return `${fmt(min)}+ ${c}`;
  return `bis ${fmt(max)} ${c}`;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function doAction(jobId, action, btn) {
  btn.disabled = true;
  try {
    const res = await fetch(`/api/jobs/${jobId}/action?action=${action}`, { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      // Refresh row status
      loadJobs();
      loadStats();
    }
  } catch (e) { console.error(e); }
  btn.disabled = false;
}

async function showAnalysis(jobId, title) {
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-title').textContent = 'AI Analysis: ' + title;
  document.getElementById('modal-body').textContent = 'Loading analysis...';

  try {
    const res = await fetch(`/api/jobs/${jobId}/analyze`);
    const data = await res.json();
    document.getElementById('modal-body').textContent = data.analysis || data.error || 'No analysis';
  } catch (e) {
    document.getElementById('modal-body').textContent = 'Error: ' + e.message;
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Init
loadStats();
loadJobs();

// Auto-refresh every 5 min
setInterval(() => { loadStats(); loadJobs(); }, 300000);
</script>

</body>
</html>
